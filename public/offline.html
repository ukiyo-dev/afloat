<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>浮生 - 离线</title>
    <style>
      :root {
        color: #111111;
        background: #f7f2e8;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }

      body {
        min-height: 100vh;
        margin: 0;
        border-top: 8px solid #111111;
        display: grid;
        place-items: center;
      }

      main {
        width: min(520px, calc(100vw - 32px));
        border: 2px solid #111111;
        box-shadow: 6px 6px 0 #111111;
        background: #fffaf0;
        padding: 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>当前离线</h1>
      <p>浮生已安装为应用，但此页面需要网络或已缓存的数据。恢复连接后请重新打开。</p>
    </main>
  </body>
</html>
